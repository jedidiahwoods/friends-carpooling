<!-- Safety net: surfaces any load/run error on-screen instead of a blank page. -->
<script>
(function () {
  var errs = [];
  function show() {
    var r = document.getElementById('app');
    if (!r || r.hasChildNodes() || !errs.length) return;
    r.innerHTML =
      '<div style="max-width:640px;margin:40px auto;padding:20px;font:14px/1.6 system-ui,sans-serif;color:#7a1f1f;background:#fdeaea;border:1px solid #f3b4b4;border-radius:12px">' +
      '<b>The app hit an error and could not start.</b><br><br><code style="white-space:pre-wrap;word-break:break-word">' +
      errs.join('<br>') + '</code><br><br><span style="color:#666">Copy this and send it to Claude.</span></div>';
  }
  function add(m) { errs.push(String(m)); show(); }
  window.addEventListener('error', function (e) {
    if (e.target && (e.target.src || e.target.href)) add('Failed to load: ' + (e.target.src || e.target.href));
    else add((e.message || 'Unknown error') + (e.lineno ? (' — line ' + e.lineno) : ''));
  }, true);
  window.addEventListener('unhandledrejection', function (e) {
    add('Promise error: ' + ((e.reason && e.reason.message) || e.reason || 'unknown'));
  });
  document.addEventListener('DOMContentLoaded', show);
})();
</script>

<style>
  :root {
    --go:#1FA971; --go-dark:#178A5C; --go-soft:#E6F6EE;
    --ink:#16181D; --muted:#6B7280; --line:#E6E8EC; --paper:#F5F6F8; --card:#FFFFFF;
    --sun:#FFD66B; --sun-soft:#FFF6DE; --sun-ink:#8a6d1f;
  }
  * { box-sizing:border-box; font-variant-numeric:tabular-nums; }
  html { -webkit-text-size-adjust:100%; }
  body {
    margin:0; background:var(--paper); color:var(--ink);
    font-family:'Space Grotesk', ui-sans-serif, system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  a { color:inherit; }
  .wrap { max-width:680px; margin:0 auto; padding:0 16px; }
  header.top {
    position:sticky; top:0; z-index:20; background:rgba(245,246,248,.9);
    backdrop-filter:blur(8px); border-bottom:1px solid var(--line);
  }
  header.top .wrap { padding-top:12px; padding-bottom:12px; }
  h1.title { font-size:21px; font-weight:700; letter-spacing:-.01em; margin:0; }
  .sub { font-size:12px; color:var(--muted); margin:2px 0 0; }
  nav.tabs { display:flex; gap:4px; margin-top:12px; flex-wrap:wrap; }
  nav.tabs button {
    border:0; background:none; cursor:pointer; font-family:inherit;
    font-size:14px; font-weight:600; color:var(--muted);
    padding:6px 12px; border-radius:8px;
  }
  nav.tabs button:hover { background:rgba(230,232,236,.6); color:var(--ink); }
  nav.tabs button.active { background:var(--ink); color:#fff; }
  main { padding:24px 0 96px; }
  h2.sec { font-size:18px; font-weight:700; margin:0; }
  .row { display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .muted { color:var(--muted); }
  .grid { display:grid; gap:12px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:16px; padding:16px; }
  .card.dash { border-style:dashed; text-align:center; padding:28px 16px; }
  .fade { animation:fade .3s ease both; }
  @keyframes fade { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
  @media (prefers-reduced-motion:reduce){ .fade{animation:none} }

  .btn {
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
    font-family:inherit; font-size:14px; font-weight:600; cursor:pointer;
    border-radius:12px; padding:10px 16px; border:1px solid transparent; transition:.15s;
  }
  .btn:active { transform:scale(.98); }
  .btn.primary { background:var(--go); color:#fff; }
  .btn.primary:hover { background:var(--go-dark); }
  .btn.ghost { background:#fff; color:var(--ink); border-color:var(--line); }
  .btn.ghost:hover { border-color:rgba(22,24,29,.3); }
  .btn.subtle { background:var(--paper); color:var(--ink); }
  .btn.subtle:hover { background:rgba(230,232,236,.7); }
  .btn.danger { background:#fff; color:#dc2626; border-color:#fecaca; }
  .btn.danger:hover { background:#fef2f2; }
  .btn.sm { padding:6px 12px; font-size:12px; border-radius:10px; }
  .btn.block { width:100%; }
  .btn[disabled] { opacity:.4; cursor:default; }

  .chip {
    display:inline-flex; align-items:center; gap:4px; font-size:12px; font-weight:500;
    border:1px solid var(--line); border-radius:999px; padding:2px 10px;
    background:var(--paper); color:var(--muted);
  }
  .chip.go { background:var(--go-soft); color:var(--go-dark); border-color:rgba(31,169,113,.3); }
  .chip.sun { background:var(--sun-soft); color:var(--sun-ink); border-color:rgba(255,214,107,.5); }
  .chip.plain { background:#fff; color:var(--ink); }
  .chips { display:flex; flex-wrap:wrap; gap:6px; margin-top:8px; }

  .ribbon { display:flex; align-items:center; gap:6px; font-size:12px; font-weight:500; margin-top:8px; }
  .ribbon .dash { color:var(--line); }

  label.field { display:block; margin-bottom:14px; }
  label.field > .lab { display:block; font-size:14px; font-weight:600; margin-bottom:6px; }
  label.field > .hint { display:block; font-size:12px; color:var(--muted); margin-top:5px; }
  input, select {
    width:100%; font-family:inherit; font-size:14px; color:var(--ink);
    background:#fff; border:1px solid var(--line); border-radius:12px; padding:10px 14px;
  }
  input:focus, select:focus { outline:none; border-color:var(--go); box-shadow:0 0 0 3px rgba(31,169,113,.25); }
  input.code { text-transform:uppercase; letter-spacing:.15em; }
  .two { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .box { border:1px solid var(--line); background:rgba(245,246,248,.6); border-radius:16px; padding:14px; margin-bottom:14px; }
  .box .boxlab { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:0 0 10px; }
  .seg button {
    width:100%; text-align:left; font-family:inherit; font-size:14px; font-weight:500; cursor:pointer;
    border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:12px; padding:10px 14px; margin-bottom:8px;
  }
  .seg button.on { border-color:var(--go); background:var(--go-soft); color:var(--go-dark); }

  .pill {
    display:inline-flex; border:1px solid var(--line); background:#fff; border-radius:12px; padding:4px; gap:2px;
  }
  .pill button {
    border:0; background:none; cursor:pointer; font-family:inherit; font-size:14px; font-weight:600;
    color:var(--muted); padding:6px 14px; border-radius:9px;
  }
  .pill button.on { background:var(--go); color:#fff; }

  .hintbox { margin-top:12px; border-radius:12px; padding:10px 12px; font-size:12px; }
  .hintbox.sun { border:1px solid rgba(255,214,107,.5); background:var(--sun-soft); color:var(--sun-ink); }
  .hintbox.plain { border:1px solid var(--line); background:var(--paper); color:var(--muted); }

  details.allg { margin-top:8px; }
  details.allg summary { cursor:pointer; font-size:14px; font-weight:600; }
  .gline { background:var(--paper); border-radius:12px; padding:10px 12px; margin-top:8px; }
  .gline .gp { font-size:11px; font-weight:700; color:var(--muted); margin:0; }
  .gline .gn { font-size:14px; margin:2px 0 0; }

  .banner { border-radius:16px; padding:14px 16px; font-size:14px; }
  .banner.go { background:rgba(230,246,238,.7); border:1px solid rgba(31,169,113,.2); }
  .banner.warn { background:#fffbeb; border:1px solid #fde68a; color:#92400e; }

  /* modal */
  .overlay { position:fixed; inset:0; z-index:30; background:rgba(22,24,29,.3); display:flex; align-items:flex-end; justify-content:center; }
  @media(min-width:640px){ .overlay{ align-items:center; padding:16px; } }
  .modal { background:#fff; width:100%; max-width:460px; max-height:92vh; overflow-y:auto; border-radius:24px 24px 0 0; padding:20px; }
  @media(min-width:640px){ .modal{ border-radius:24px; } }
  .modal h2 { font-size:18px; font-weight:700; margin:0 0 16px; }

  .toast {
    position:fixed; left:50%; bottom:16px; transform:translateX(-50%); z-index:40;
    background:var(--ink); color:#fff; font-size:14px; font-weight:500;
    padding:12px 16px; border-radius:12px; max-width:92vw; text-align:center; box-shadow:0 8px 24px rgba(0,0,0,.18);
  }
  .stack > * + * { margin-top:16px; }
  .msg { background:#fff; border:1px solid var(--line); border-radius:14px; padding:10px 12px; }
  .msg-h { display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .msg-b { font-size:14px; margin-top:4px; white-space:pre-wrap; word-break:break-word; }
  .composer { display:flex; gap:8px; margin-top:12px; }
  .scopepills { display:flex; flex-wrap:wrap; gap:6px; }
  .dot { display:inline-block; width:7px; height:7px; border-radius:999px; background:var(--go); margin-left:5px; vertical-align:middle; }
  nav.tabs button.active .dot { background:#fff; }
  .link { color:var(--go-dark); font-weight:600; cursor:pointer; background:none; border:0; font-family:inherit; font-size:14px; padding:0; }
  .link:hover { text-decoration:underline; }
  .carlink {
    display:inline-flex; align-items:center; gap:4px; font-size:14px; font-weight:600;
    border:1px solid var(--line); background:var(--paper); border-radius:12px; padding:8px 12px; text-decoration:none; margin:0 8px 8px 0;
  }
  .carlink:hover { border-color:var(--go); background:var(--go-soft); }
</style>

<body>
<div id="app"></div>

<script>
/* =================================================================
   CONFIG  —  edit these
   ================================================================= */
var firebaseConfig = {
  apiKey: "AIzaSyD-3uv27LU4wKRHJ-PAKme4rU5X8UxtqhY",
  authDomain: "friends-carpooling.firebaseapp.com",
  projectId: "friends-carpooling",
  storageBucket: "friends-carpooling.firebasestorage.app",
  messagingSenderId: "861847892523",
  appId: "1:861847892523:web:d2f8d175c713eeb887b06e"
};
var ADMIN_PASSWORD = "jim";
var HEADER_TITLE = "Jed's Carpooling Tool";
var HEADER_SUB   = "From Paris to Château de Fretoy for Elyse and Jedidiah's wedding!";
var VENUE_NAME   = "Château de Fretoy";
var VENUE_SHORT  = "Fretoy";
var DEFAULT_ARRIVAL_DATE = "2026-06-30";
var DEFAULT_DEPARTURE_DATE = "2026-07-03";
var SEATS_PER_CAR = 5;
var AIRPORTS = ["Paris", "Geneva", "Other"];
var WILLING = [
  { key:"yes",   label:"Yes, I can hold the rental" },
  { key:"maybe", label:"Maybe / open to it" },
  { key:"no",    label:"No, I'd ride along" }
];
var RENTAL_SPOTS = [
  { place:"Paris – Charles de Gaulle (CDG)", note:"Main airport for Paris arrivals", links:[
    {name:"Budget", url:"https://www.budget.com"}, {name:"Enterprise", url:"https://www.enterprise.com"}, {name:"Sixt", url:"https://www.sixt.com"} ] },
  { place:"Le Creusot TGV station", note:"Closest train station to Morlet", links:[
    {name:"Budget", url:"https://www.budget.com"}, {name:"Enterprise", url:"https://www.enterprise.com"}, {name:"Sixt", url:"https://www.sixt.com"} ] },
  { place:"Geneva Airport (GVA)", note:"For Geneva arrivals / departures", links:[
    {name:"Budget", url:"https://www.budget.ch"}, {name:"Enterprise", url:"https://www.enterprise.com"}, {name:"Sixt", url:"https://www.sixt.com"} ] }
];

/* =================================================================
   Firebase init
   ================================================================= */
var db = null, CONFIGURED = false;
try {
  if (firebaseConfig.apiKey && firebaseConfig.apiKey.indexOf("PASTE") !== 0) {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
    CONFIGURED = true;
  }
} catch (e) { console.error("Firebase init failed:", e); }

/* =================================================================
   State + helpers
   ================================================================= */
var LS_KEY = "flcp_owned_v1";
function loadOwned(){ try { return JSON.parse(localStorage.getItem(LS_KEY) || "[]"); } catch(e){ return []; } }
function saveOwned(l){ try { localStorage.setItem(LS_KEY, JSON.stringify(l)); } catch(e){} }

var state = {
  entries: [], messages: [], loaded: !CONFIGURED, tab: "pool",
  owned: loadOwned(), admin: false, dir: "arr", boardScope: "general",
  activeId: null, form: null, claimOpen: false, howto: false, modePick: false
};
var HOWTO_KEY = "flcp_howto_seen_v1";
function seenHowto(){ try { return localStorage.getItem(HOWTO_KEY)==="1"; } catch(e){ return false; } }
function markHowtoSeen(){ try { localStorage.setItem(HOWTO_KEY,"1"); } catch(e){} }
var SEEN_KEY = "flcp_board_seen_v1";
function loadSeen(){ try { return parseInt(localStorage.getItem(SEEN_KEY)||"0",10)||0; } catch(e){ return 0; } }
function markSeen(){ try { localStorage.setItem(SEEN_KEY, String(Date.now())); } catch(e){} }
function msgMs(m){ return (m.createdAt && m.createdAt.toMillis) ? m.createdAt.toMillis() : Date.now(); }
function boardHasUnread(){ var seen=loadSeen(); return state.messages.some(function(m){ return msgMs(m) > seen; }); }

function genCode(){ var c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789", s=""; for(var i=0;i<6;i++) s+=c[Math.floor(Math.random()*c.length)]; return s; }
function genId(){ return Math.random().toString(36).slice(2,10)+Date.now().toString(36); }
function norm(s){ return (s||"").trim().toLowerCase(); }
function firstName(name){ return ((name||"").trim().split(/\s+/)[0]||""); }
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g, function(c){ return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }
function airportLabel(e, which){
  var a = which==="arr" ? e.arrivalAirport : e.departureAirport;
  if (a==="Other") return (which==="arr" ? e.arrivalAirportOther : e.departureAirportOther) || "Other";
  return a;
}
function TRAIN_STATION(){ return "Le Creusot"; }
function locLabel(e, which){
  var mode = which==="arr" ? e.arrivalMode : e.departureMode;
  if(mode==="train") return TRAIN_STATION();
  return airportLabel(e, which);
}
function locIcon(e, which){
  var mode = which==="arr" ? e.arrivalMode : e.departureMode;
  return mode==="train" ? "🚆" : "✈";
}
function arrLoc(e){ return e.arrivalMode==="train" ? "Le Creusot" : (e.arrivalAirport==="Other" ? "O:"+norm(e.arrivalAirportOther) : e.arrivalAirport); }
function depLoc(e){ return e.departureMode==="train" ? "Le Creusot" : (e.departureAirport==="Other" ? "O:"+norm(e.departureAirportOther) : e.departureAirport); }
function fmtDate(d){
  if(!d) return "";
  var dt = new Date(d+"T00:00:00");
  if(isNaN(dt)) return d;
  return dt.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
}
function arrKey(e){ return arrLoc(e)+"|"+e.arrivalDate; }
function depKey(e){ return depLoc(e)+"|"+e.departureDate; }
function ownedIds(){ var s={}; state.owned.forEach(function(o){ s[o.id]=1; }); return s; }
function isOwned(e){ return !!ownedIds()[e.id]; }
function myEntries(){ var o=ownedIds(); return state.entries.filter(function(e){ return o[e.id]; }); }

var toastTimer=null;
function toast(m){
  var t=document.getElementById("toast");
  if(!t){ t=document.createElement("div"); t.id="toast"; document.body.appendChild(t); }
  t.className="toast fade"; t.textContent=m; t.style.display="block";
  clearTimeout(toastTimer); toastTimer=setTimeout(function(){ t.style.display="none"; }, 3800);
}

/* =================================================================
   Firestore actions
   ================================================================= */
function update(id, patch){ if(!CONFIGURED) return Promise.resolve(); return db.collection("entries").doc(id).update(patch).catch(function(e){ console.error(e); toast("Update failed."); }); }

function addEntry(f){
  if(!CONFIGURED){ toast("Not connected to the database."); return; }
  var code = firstName(f.name) || genCode();
  db.collection("entries").add({
    name:f.name, partySize:f.partySize,
    arrivalMode:f.arrivalMode, departureMode:f.departureMode, arrivalTime:f.arrivalTime||"", needsShuttle:!!f.needsShuttle, brunch:!!f.brunch,
    arrivalAirport:f.arrivalAirport, arrivalAirportOther:f.arrivalAirportOther, arrivalDate:f.arrivalDate,
    departureAirport:f.departureAirport, departureAirportOther:f.departureAirportOther, departureDate:f.departureDate,
    rentalWillingness:f.rentalWillingness, hasCar:f.hasCar, openSeats:f.openSeats, contact:f.contact||"", departureTime:f.departureTime||"", arrivalGroupId:null, departureGroupId:null,
    editCode:code, createdAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(ref){
    state.owned = state.owned.concat([{id:ref.id, code:code}]); saveOwned(state.owned);
    state.form=null; render();
    toast("You're in! To edit later, just use your first name: "+code);
  }).catch(function(e){ console.error(e); toast("Save failed."); });
}

function saveEdit(id, f){
  update(id, {
    name:f.name, partySize:f.partySize,
    arrivalMode:f.arrivalMode, departureMode:f.departureMode, arrivalTime:f.arrivalTime||"", needsShuttle:!!f.needsShuttle, brunch:!!f.brunch,
    arrivalAirport:f.arrivalAirport, arrivalAirportOther:f.arrivalAirportOther, arrivalDate:f.arrivalDate,
    departureAirport:f.departureAirport, departureAirportOther:f.departureAirportOther, departureDate:f.departureDate,
    rentalWillingness:f.rentalWillingness, hasCar:f.hasCar, openSeats:f.openSeats, contact:f.contact||"", departureTime:f.departureTime||"", editCode:firstName(f.name)
  }).then(function(){ state.form=null; render(); toast("Saved."); });
}

function deleteEntry(e){
  if(!confirm("Remove \""+e.name+"\" from the carpool?")) return;
  db.collection("entries").doc(e.id).delete().then(function(){
    state.owned = state.owned.filter(function(o){ return o.id!==e.id; }); saveOwned(state.owned);
    toast("Removed.");
  }).catch(function(err){ console.error(err); toast("Delete failed."); });
}

function claimByCode(code){
  var hit=null;
  state.entries.forEach(function(e){ if(norm(e.editCode)===norm(code)) hit=e; });
  if(hit){
    if(!ownedIds()[hit.id]){ state.owned=state.owned.concat([{id:hit.id, code:hit.editCode}]); saveOwned(state.owned); }
    state.claimOpen=false; render(); toast("Found \""+hit.name+"\" — you can edit it here now.");
  } else toast("No match for that code.");
}

/* messages */
function postMessage(text, scope, author, authorId){
  if(!CONFIGURED){ toast("Not connected to the database."); return; }
  if(!text.trim()) return;
  db.collection("messages").add({
    text:text.trim(), scope:scope, author:author, authorId:authorId||null,
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  }).then(function(){ markSeen(); }).catch(function(e){ console.error(e); toast("Couldn't post message."); });
}
function deleteMessage(m){
  db.collection("messages").doc(m.id).delete().catch(function(e){ console.error(e); toast("Couldn't delete."); });
}

/* grouping */
function joinGroup(me, gid, dir){ var k=dir==="arr"?"arrivalGroupId":"departureGroupId"; var p={}; p[k]=gid; update(me.id,p).then(function(){ toast("Joined."); }); }
function leaveGroup(me, dir){ var k=dir==="arr"?"arrivalGroupId":"departureGroupId"; var p={}; p[k]=null; update(me.id,p).then(function(){ toast("Left the group."); }); }
function startGroup(me, other, dir){
  var k=dir==="arr"?"arrivalGroupId":"departureGroupId"; var gid=genId();
  var a={}, b={}; a[k]=gid; b[k]=gid;
  update(me.id,a).then(function(){ return update(other.id,b); }).then(function(){ toast("Group started."); });
}
function adminKick(e, dir){ var k=dir==="arr"?"arrivalGroupId":"departureGroupId"; var p={}; p[k]=null; update(e.id,p).then(function(){ toast("Removed from group."); }); }

function groupsByDir(dir){
  var key=dir==="arr"?"arrivalGroupId":"departureGroupId", map={};
  state.entries.forEach(function(e){ var g=e[key]; if(g){ (map[g]=map[g]||[]).push(e); } });
  return map;
}
function seatInfo(members){
  var total=members.reduce(function(s,m){ return s+(m.partySize||1); },0), tone="go", text;
  if(total<SEATS_PER_CAR) text=total+" of "+SEATS_PER_CAR+" seats — room for more";
  else if(total===SEATS_PER_CAR) text="Full car — "+total+" of "+SEATS_PER_CAR;
  else { tone="sun"; text=total+" people — you'll need a van or 2nd car"; }
  return { total:total, tone:tone, text:text };
}
function rentalHint(members, airport){
  var rt=members.filter(function(m){ return airportLabel(m,"arr")===airportLabel(m,"dep") && airportLabel(m,"arr")===airport; });
  if(rt.length===0) return {kind:"none"};
  var yes=rt.filter(function(m){return m.rentalWillingness==="yes";});
  var maybe=rt.filter(function(m){return m.rentalWillingness==="maybe";});
  return { kind:"found", pick:(yes[0]||maybe[0]||rt[0]), many:rt.length>1 };
}

/* =================================================================
   Render
   ================================================================= */
function ribbon(e){
  return '<div class="ribbon"><span>'+locIcon(e,"arr")+' '+esc(locLabel(e,"arr"))+'</span>'
       + '<span class="dash">———</span><span>🏰 '+esc(VENUE_SHORT)+'</span>'
       + '<span class="dash">———</span><span>'+esc(locLabel(e,"dep"))+' '+locIcon(e,"dep")+'</span></div>';
}

function digitsOnly(s){ return (s||"").replace(/[^0-9]/g,""); }
function canSeeContacts(){ return state.admin || myEntries().length>0; }
function contactRow(e){
  if(!e.contact || !canSeeContacts()) return '';
  var wa=digitsOnly(e.contact);
  return '<div style="margin-top:12px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;border-top:1px solid var(--line);padding-top:12px">'
    + '<span class="muted" style="font-size:13px">📞 '+esc(e.contact)+'</span>'
    + (wa ? '<a class="btn ghost sm" href="https://wa.me/'+wa+'" target="_blank" rel="noopener noreferrer">WhatsApp ↗</a>' : '')
    + '<button class="btn subtle sm" data-action="copy" data-contact="'+esc(e.contact)+'">Copy number</button></div>';
}
function copyText(txt){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){ toast("Copied: "+txt); }, function(){ fallbackCopy(txt); });
  } else fallbackCopy(txt);
}
function fallbackCopy(txt){
  try{ var ta=document.createElement("textarea"); ta.value=txt; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); toast("Copied: "+txt); }
  catch(e){ toast("Couldn't copy automatically — long-press the number to copy."); }
}

function fmtClock(t){
  if(!t) return "";
  var p=String(t).split(":"); if(p.length<2) return t;
  var h=parseInt(p[0],10), m=p[1], ap=h>=12?"PM":"AM", h12=h%12; if(h12===0) h12=12;
  return h12+":"+m+" "+ap;
}
function depTimeNote(members){
  var uniq=[];
  members.forEach(function(m){ if(m.departureTime){ var t=fmtClock(m.departureTime)+(m.departureMode==="train"?" 🚆":""); if(uniq.indexOf(t)<0) uniq.push(t); } });
  if(!uniq.length) return '';
  return '<div class="hintbox plain">🕐 Departure times: '+esc(uniq.join(", "))+'</div>';
}
function arrTimeNote(members){
  var uniq=[];
  members.forEach(function(m){ if(m.arrivalTime){ var t=fmtClock(m.arrivalTime)+(m.arrivalMode==="train"?" 🚆":""); if(uniq.indexOf(t)<0) uniq.push(t); } });
  if(!uniq.length) return '';
  return '<div class="hintbox plain">🕐 Arrival times: '+esc(uniq.join(", "))+'</div>';
}
function shuttleNote(members){
  var n=0; members.forEach(function(m){ if(m.arrivalMode==="train" && m.needsShuttle) n+=(m.partySize||1); });
  if(!n) return '';
  return '<div class="hintbox sun">🚐 '+n+' '+(n===1?"person needs":"people need")+' a shuttle from Le Creusot.</div>';
}
function brunchNote(members){
  var n=0; members.forEach(function(m){ if(m.brunch) n+=(m.partySize||1); });
  if(!n) return '';
  return '<div class="hintbox plain">🥐 '+n+' staying for brunch (9am).</div>';
}

function carChip(e){
  if(e.hasCar){
    var s=e.openSeats||0;
    return '<span class="chip go">🚗 Car booked'+(s>0?(" · "+s+" open seat"+(s===1?"":"s")):" · full")+'</span>';
  }
  var tone=e.rentalWillingness==="yes"?"go":e.rentalWillingness==="maybe"?"sun":"";
  var txt=e.rentalWillingness==="yes"?"Can hold rental":e.rentalWillingness==="maybe"?"Maybe holds rental":"Riding along";
  return '<span class="chip '+tone+'">'+txt+'</span>';
}

function entryCard(e){
  var manage = isOwned(e) || state.admin;
  return '<div class="card fade"><div class="row" style="align-items:flex-start">'
    + '<div style="min-width:0">'
      + '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><strong style="font-size:16px">'+esc(e.name)+'</strong>'
      + '<span class="chip plain">'+e.partySize+(e.partySize===1?" person":" people")+'</span></div>'
      + ribbon(e)
      + '<div class="chips">'
        + '<span class="chip">In · '+esc(fmtDate(e.arrivalDate))+(e.arrivalTime?' · '+esc(fmtClock(e.arrivalTime)):'')+'</span>'
        + '<span class="chip">Out · '+esc(fmtDate(e.departureDate))+(e.departureTime?' · '+esc(fmtClock(e.departureTime)):'')+'</span>'
        + carChip(e)
        + (e.arrivalMode==="train" && e.needsShuttle?'<span class="chip sun">🚐 Needs shuttle</span>':'')
        + (e.brunch?'<span class="chip">🥐 Brunch</span>':'')
        + (e.arrivalGroupId?'<span class="chip go">In ride-in group</span>':'')
        + (e.departureGroupId?'<span class="chip go">In ride-out group</span>':'')
      + '</div>'
    + '</div>'
    + (manage ? '<div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">'
        + '<button class="btn subtle sm" data-action="edit" data-id="'+e.id+'">Edit</button>'
        + '<button class="btn danger sm" data-action="delete" data-id="'+e.id+'">Delete</button></div>' : '')
    + '</div>'
    + contactRow(e)
    + (isOwned(e)&&!state.admin ? '<p class="muted" style="font-size:12px;margin:12px 0 0">This is you — only you can edit it on this device.</p>' : '')
    + '</div>';
}

function claimBlock(openLabel, submitLabel){
  if(!state.claimOpen){
    return '<div class="card"><button class="link" data-action="claim-open">'+esc(openLabel)+' →</button></div>';
  }
  return '<div class="card"><p style="font-weight:600;margin:0 0 4px">Log back in on this device</p>'
    + '<p class="muted" style="font-size:12px;margin:0 0 8px">Enter the first name you signed up with.</p>'
    + '<div style="display:flex;gap:8px"><input id="claimCode" placeholder="Your first name" style="flex:1">'
    + '<button class="btn ghost" data-action="claim-submit">'+esc(submitLabel||"Log in")+'</button></div></div>';
}

function poolTab(){
  var h = '<div class="stack">';
  h += '<div class="row"><h2 class="sec">Who\'s Carpooling? <span class="muted" style="font-weight:500">('+state.entries.length+')</span></h2>'
     + '<button class="btn primary" data-action="add">+ Add yourself</button></div>';
  if(state.entries.length===0){
    h += '<div class="card dash"><p style="font-weight:600;margin:0">No one\'s in the pool yet.</p>'
       + '<p class="muted" style="margin:6px 0 16px">Be the first — add your party and pick your airports.</p>'
       + '<button class="btn primary" data-action="add">+ Add yourself</button></div>';
  } else {
    h += '<div class="grid">' + state.entries.map(entryCard).join("") + '</div>';
  }
  // claim
  h += claimBlock("Editing from a new device? Enter your first name", "Find");
  h += '</div>';
  return h;
}

function carpoolsTab(){
  var dir=state.dir, idKey=dir==="arr"?"arrivalGroupId":"departureGroupId", keyFn=dir==="arr"?arrKey:depKey;
  var mine=myEntries();
  var me=null;
  for(var i=0;i<mine.length;i++){ if(mine[i].id===state.activeId){ me=mine[i]; break; } }
  if(!me) me=mine[0]||null;

  var h='<div class="stack">';
  h += '<div class="pill"><button data-action="dir" data-dir="arr" class="'+(dir==="arr"?"on":"")+'">Ride in ✈→🏰</button>'
     + '<button data-action="dir" data-dir="dep" class="'+(dir==="dep"?"on":"")+'">Ride out 🏰→✈</button></div>';
  h += '<p class="muted" style="font-size:14px;margin:0">'
     + (dir==="arr"?"Group up with people arriving at the same place (airport or Le Creusot station) on the same day, for the ride to "+esc(VENUE_NAME)+"."
                   :"Group up with people leaving from the same place on the same day, for the ride back.")+'</p>';

  if(!me){
    h += '<div class="card dash"><p style="font-weight:600;margin:0">Add yourself to the pool first.</p>'
       + '<p class="muted" style="margin:6px 0 0;font-size:14px">Once you\'re in, you can join or start a carpool here.</p></div>';
    h += claimBlock("Log back in to join a carpool (your first name)", "Log in");
    h += '</div>';
    return h;
  }

  if(mine.length>1){
    h += '<label class="field"><span class="lab">Acting as</span><select data-action="set-active">'
       + mine.map(function(e){ return '<option value="'+e.id+'"'+(e.id===me.id?" selected":"")+'>'+esc(e.name)+'</option>'; }).join("")
       + '</select></label>';
  }

  var place = locLabel(me, dir==="arr"?"arr":"dep")+" · "+fmtDate(dir==="arr"?me.arrivalDate:me.departureDate);
  h += '<div class="banner go">You\'re <strong>'+esc(me.name)+'</strong> · '+esc(place)+' — showing everyone who matches.</div>';

  var myKey=keyFn(me);
  var groups=groupsByDir(dir);
  var compatGroups=[];
  Object.keys(groups).forEach(function(gid){ if(keyFn(groups[gid][0])===myKey) compatGroups.push([gid, groups[gid]]); });
  var ungrouped=state.entries.filter(function(e){ return keyFn(e)===myKey && !e[idKey] && e.id!==me.id; });
  var myGroupId=me[idKey];
  var compatIds={}; compatGroups.forEach(function(p){ compatIds[p[0]]=1; });
  var otherKeys=Object.keys(groups).filter(function(gid){ return !compatIds[gid]; });

  if(compatGroups.length){
    h += '<div><p class="box boxlab" style="background:none;border:0;padding:0;margin-bottom:8px">Groups you can join</p>';
    compatGroups.forEach(function(pair){
      var members=pair[1], airport=locLabel(members[0], dir==="arr"?"arr":"dep");
      var seat=seatInfo(members), inThis=members.some(function(m){return m.id===me.id;});
      h += '<div class="card" style="margin-bottom:8px"><div class="row"><strong style="font-size:14px">'+esc(members.map(function(m){return m.name;}).join(", "))+'</strong>'
         + '<span class="chip '+seat.tone+'">'+seat.text+'</span></div>';
      var carM=members.filter(function(m){ return m.hasCar; });
      if(carM.length){
        var openT=carM.reduce(function(s,m){ return s+(m.openSeats||0); },0);
        h += '<div class="hintbox plain">🚗 '+esc(carM.map(function(m){return m.name;}).join(", "))+' '+(carM.length>1?"have cars booked":"has a car booked")+' — '+openT+' open seat'+(openT===1?"":"s")+' for this group.</div>';
      }
      if(dir==="dep") h += depTimeNote(members);
      if(dir==="dep") h += brunchNote(members);
      if(dir==="arr") h += arrTimeNote(members);
      if(dir==="arr") h += shuttleNote(members);
      if(dir==="arr" && members[0].arrivalMode!=="train"){
        var hint=rentalHint(members, airport);
        if(hint.kind==="found") h += '<div class="hintbox sun">💡 <strong>'+esc(hint.pick.name)+'</strong> '+(hint.many?"(and others) are":"is")+' round-trip via '+esc(airport)+' — likely cheapest to hold the rental (no drop-off fee).</div>';
        else h += '<div class="hintbox plain">Heads up: no one here is round-trip via '+esc(airport)+', so whoever holds the car may pay a one-way drop-off fee. Worth coordinating.</div>';
      }
      h += '<div style="margin-top:12px">'
        + (inThis ? '<button class="btn danger sm" data-action="leave">Leave this group</button>'
                  : '<button class="btn ghost sm" data-action="join" data-gid="'+pair[0]+'">Join this group</button>')
        + '</div></div>';
    });
    h += '</div>';
  }

  if(!myGroupId && ungrouped.length){
    h += '<div><p class="box boxlab" style="background:none;border:0;padding:0;margin-bottom:8px">Not grouped yet — start a ride together</p>';
    ungrouped.forEach(function(e){
      h += '<div class="card" style="margin-bottom:8px"><div class="row"><div><strong style="font-size:14px">'+esc(e.name)+'</strong>'
         + '<p class="muted" style="font-size:12px;margin:2px 0 0">'+e.partySize+(e.partySize===1?" person":" people")
         + (e.hasCar?' · 🚗 '+(e.openSeats||0)+' open seat'+((e.openSeats||0)===1?'':'s'):'')
         + (dir==="dep" && e.departureTime?' · 🕐 '+esc(fmtClock(e.departureTime)):'')
         + (dir==="arr" && e.arrivalTime?' · 🕐 '+esc(fmtClock(e.arrivalTime)):'')+'</p></div>'
         + '<button class="btn ghost sm" data-action="start" data-id="'+e.id+'">Start a group</button></div></div>';
    });
    h += '</div>';
  }

  if(!myGroupId && !ungrouped.length && !compatGroups.length && !otherKeys.length){
    h += '<div class="card dash"><p class="muted" style="font-size:14px;margin:0">No '
       + (dir==="arr"?"ride-in":"ride-out")+' groups yet. Check back as more people sign up, or start one.</p></div>';
  }

  // other groups — joinable even if they don't exactly match your airport/date
  if(otherKeys.length){
    h += '<div><p class="box boxlab" style="background:none;border:0;padding:0;margin-bottom:8px">Other '+(dir==="arr"?"ride-in":"ride-out")+' groups — you can still join any of these</p>';
    otherKeys.forEach(function(gid){
      var m=groups[gid], ap=locLabel(m[0], dir==="arr"?"arr":"dep"), dt=fmtDate(dir==="arr"?m[0].arrivalDate:m[0].departureDate);
      var seat=seatInfo(m), inThis=m.some(function(x){return x.id===me.id;});
      var carM=m.filter(function(x){ return x.hasCar; });
      h += '<div class="card" style="margin-bottom:8px"><div class="row"><div style="min-width:0"><strong style="font-size:14px">'+esc(m.map(function(x){return x.name;}).join(", "))+'</strong>'
         + '<p class="muted" style="font-size:12px;margin:2px 0 0">'+esc(ap+' · '+dt)+'</p></div>'
         + '<span class="chip '+seat.tone+'">'+seat.text+'</span></div>';
      if(carM.length){
        var openT=carM.reduce(function(s,x){ return s+(x.openSeats||0); },0);
        h += '<div class="hintbox plain">🚗 '+openT+' open seat'+(openT===1?"":"s")+' offered in this group.</div>';
      }
      if(dir==="dep") h += depTimeNote(m);
      if(dir==="dep") h += brunchNote(m);
      if(dir==="arr") h += arrTimeNote(m);
      if(dir==="arr") h += shuttleNote(m);
      h += '<div style="margin-top:10px">'
        + (inThis ? '<button class="btn danger sm" data-action="leave">Leave this group</button>'
                  : '<button class="btn ghost sm" data-action="join" data-gid="'+gid+'">Join this group</button>')
        + '</div></div>';
    });
    h += '</div>';
  }

  h += '</div>';
  return h;
}

function fmtTime(ts){
  if(!ts || !ts.toDate) return "just now";
  return ts.toDate().toLocaleString("en-US",{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
}
function boardTab(){
  var me = myEntries()[0] || null;
  var scopes = [{id:"general", label:"General"}];
  if(me && me.arrivalGroupId) scopes.push({id:me.arrivalGroupId, label:"Ride-in group"});
  if(me && me.departureGroupId) scopes.push({id:me.departureGroupId, label:"Ride-out group"});
  var valid = scopes.some(function(s){ return s.id===state.boardScope; });
  if(!valid) state.boardScope="general";
  var scopeId = state.boardScope;
  var current = scopes.filter(function(s){ return s.id===scopeId; })[0];

  var msgs = state.messages.filter(function(m){ return m.scope===scopeId; });

  var h='<div class="stack"><h2 class="sec">Message Board</h2>';
  if(scopes.length>1){
    h += '<div class="scopepills">'
      + scopes.map(function(s){ return '<button class="btn '+(s.id===scopeId?"primary":"ghost")+' sm" data-action="board-scope" data-scope="'+s.id+'">'+esc(s.label)+'</button>'; }).join("")
      + '</div>';
  }
  h += '<p class="muted" style="font-size:13px;margin:0">'
     + (scopeId==="general" ? "Open board for everyone carpooling — say hi, ask questions, coordinate."
        : "Private board for your "+esc(current?current.label.toLowerCase():"group")+". Only people in this group see it.")+'</p>';

  if(msgs.length===0){
    h += '<div class="card dash"><p class="muted" style="font-size:14px;margin:0">No messages yet'+(scopeId==="general"?" — say hi! 👋":" — start the conversation.")+'</p></div>';
  } else {
    h += '<div class="grid">' + msgs.map(function(m){
      var mine = state.admin || !!ownedIds()[m.authorId];
      return '<div class="msg fade"><div class="msg-h"><strong style="font-size:14px">'+esc(m.author||"Someone")+'</strong>'
        + '<span class="muted" style="font-size:11px">'+esc(fmtTime(m.createdAt))+'</span></div>'
        + '<div class="msg-b">'+esc(m.text)+'</div>'
        + (mine ? '<button class="link" style="color:#dc2626;font-size:11px;margin-top:6px" data-action="del-msg" data-id="'+m.id+'">Delete</button>' : '')
        + '</div>';
    }).join("") + '</div>';
  }

  if(me){
    h += '<div class="composer"><input id="msgInput" placeholder="Write a message…" style="flex:1"><button class="btn primary" data-action="post-msg">Post</button></div>'
       + '<p class="muted" style="font-size:11px;margin:6px 0 0">Posting as '+esc(me.name)+'.</p>';
  } else {
    h += '<div class="card dash"><p class="muted" style="font-size:14px;margin:0">Add yourself in the Pool tab to post a message.</p></div>';
    h += claimBlock("Log in to send a message (your first name)", "Log in");
  }
  h += '</div>';
  return h;
}

function rentalRole(e){ return e.hasCar ? "owner" : (e.rentalWillingness==="yes"?"hold":e.rentalWillingness==="maybe"?"maybe":"ride"); }
function adminSetRental(id, role){
  var map={ owner:{hasCar:true,rentalWillingness:"yes"}, hold:{hasCar:false,rentalWillingness:"yes"}, maybe:{hasCar:false,rentalWillingness:"maybe"}, ride:{hasCar:false,rentalWillingness:"no"} };
  update(id, map[role]||map.ride).then(function(){ toast("Rental role updated."); });
}
function adminSetGroup(id, dir, value){
  var k=dir==="arr"?"arrivalGroupId":"departureGroupId";
  var gid = value==="" ? null : (value==="__new__" ? genId() : value);
  var p={}; p[k]=gid; update(id, p).then(function(){ toast(gid?"Group updated.":"Removed from group."); });
}
function ctrlLabel(t){ return '<span style="display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:4px">'+t+'</span>'; }
function adminGroupSelect(e, dir){
  var k=dir==="arr"?"arrivalGroupId":"departureGroupId", cur=e[k]||"", groups=groupsByDir(dir);
  var opts='<option value=""'+(cur===""?" selected":"")+'>— Not in a '+(dir==="arr"?"ride-in":"ride-out")+' group —</option>';
  Object.keys(groups).forEach(function(gid){
    var m=groups[gid], names=m.map(function(x){return x.name;}).join(", ");
    var ap=locLabel(m[0], dir==="arr"?"arr":"dep"), dt=fmtDate(dir==="arr"?m[0].arrivalDate:m[0].departureDate);
    opts+='<option value="'+gid+'"'+(cur===gid?" selected":"")+'>'+esc(names+" ("+ap+" · "+dt+")")+'</option>';
  });
  opts+='<option value="__new__">➕ New group (just '+esc(firstName(e.name)||e.name)+')</option>';
  return '<select data-action="admin-group" data-id="'+e.id+'" data-dir="'+dir+'">'+opts+'</select>';
}
function adminRentalSelect(e){
  var role=rentalRole(e), opts=[["owner","🚗 Rental owner (has car)"],["hold","Can hold rental"],["maybe","Maybe / open to it"],["ride","Ride along"]];
  return '<select data-action="admin-rental" data-id="'+e.id+'">'+opts.map(function(o){ return '<option value="'+o[0]+'"'+(role===o[0]?" selected":"")+'>'+o[1]+'</option>'; }).join("")+'</select>';
}

    : state.tab==="cars" ? carsTab()

  var unread = boardHasUnread();

  var html =
    '<header class="top"><div class="wrap">'

    + '</nav></div></header>';

    html += '<div class="wrap" style="margin-top:16px"><div class="banner warn"><strong>Not connected yet.</strong> Paste your Firebase config into the CONFIG block at the top of this file, then redeploy.</div></div>';

document.addEventListener("click", function(ev){
  var t = ev.target.closest("[data-action]");
  // willingness buttons inside form
  var w = ev.target.closest("[data-will]");
  if(w){
    formWill = w.getAttribute("data-will");
    var seg=document.getElementById("f_will");
    if(seg){ Array.prototype.forEach.call(seg.children, function(b){ b.className = (b.getAttribute("data-will")===formWill?"on":""); }); }
    return;
  }
  var mpa = ev.target.closest("[data-mpa]");
  if(mpa){
    pickArrival = mpa.getAttribute("data-mpa");
    var sm=document.getElementById("mp_a");
    if(sm){ Array.prototype.forEach.call(sm.children, function(b){ b.className=(b.getAttribute("data-mpa")===pickArrival?"on":""); }); }
    return;
  }
  var mpd = ev.target.closest("[data-mpd]");
  if(mpd){
    pickDeparture = mpd.getAttribute("data-mpd");
    var smd=document.getElementById("mp_d");
    if(smd){ Array.prototype.forEach.call(smd.children, function(b){ b.className=(b.getAttribute("data-mpd")===pickDeparture?"on":""); }); }
    return;
  }
  var am = ev.target.closest("[data-amode]");
  if(am){
    formAMode = am.getAttribute("data-amode");
    var sa=document.getElementById("f_aMode");
    if(sa){ Array.prototype.forEach.call(sa.children, function(b){ b.className=(b.getAttribute("data-amode")===formAMode?"on":""); }); }
    var aw=document.getElementById("aAirportWrap"), tw=document.getElementById("aTrainWrap"), lab=document.getElementById("aTimeLab"), ahint=document.getElementById("aTimeHint");
    if(aw) aw.style.display = formAMode==="train"?"none":"block";
    if(tw) tw.style.display = formAMode==="train"?"block":"none";
    if(lab) lab.innerHTML = (formAMode==="train"?"Train arrival time at Le Creusot station":"Estimated arrival time at "+VENUE_NAME)+' <span class="muted" style="font-weight:400">(optional)</span>';
    if(ahint) ahint.textContent = formAMode==="train"?"Your train’s scheduled arrival at Le Creusot — not your flight landing time.":"Roughly when you’ll reach the château — not your airport landing time.";
    return;
  }
  var dm = ev.target.closest("[data-dmode]");
  if(dm){
    formDMode = dm.getAttribute("data-dmode");
    var sd=document.getElementById("f_dMode");
    if(sd){ Array.prototype.forEach.call(sd.children, function(b){ b.className=(b.getAttribute("data-dmode")===formDMode?"on":""); }); }
    var dw=document.getElementById("dAirportWrap"), dtw=document.getElementById("dTrainWrap"), dlab=document.getElementById("dTimeLab"), dhint=document.getElementById("dTimeHint");
    if(dw) dw.style.display = formDMode==="train"?"none":"block";
    if(dtw) dtw.style.display = formDMode==="train"?"block":"none";
    if(dlab) dlab.innerHTML = (formDMode==="train"?"Train departure time from Le Creusot station":"Estimated departure time from "+VENUE_NAME)+' <span class="muted" style="font-weight:400">(optional)</span>';
    if(dhint) dhint.textContent = formDMode==="train"?"Your train’s scheduled departure — helps us shuttle you to the station on time.":"Roughly when you’ll leave the château — not your flight time.";
    return;
  }
  var sh = ev.target.closest("[data-shuttle]");
  if(sh){
    formShuttle = sh.getAttribute("data-shuttle");
    var ss=document.getElementById("f_shuttle");
    if(ss){ Array.prototype.forEach.call(ss.children, function(b){ b.className=(b.getAttribute("data-shuttle")===formShuttle?"on":""); }); }
    return;
  }
  var br = ev.target.closest("[data-brunch]");
  if(br){
    formBrunch = br.getAttribute("data-brunch");
    var bs=document.getElementById("f_brunch");
    if(bs){ Array.prototype.forEach.call(bs.children, function(b){ b.className=(b.getAttribute("data-brunch")===formBrunch?"on":""); }); }
    return;
  }
  var hc = ev.target.closest("[data-hascar]");
  if(hc){
    formHasCar = hc.getAttribute("data-hascar");
    var segc=document.getElementById("f_hasCar");
    if(segc){ Array.prototype.forEach.call(segc.children, function(b){ b.className = (b.getAttribute("data-hascar")===formHasCar?"on":""); }); }
    var yes=document.getElementById("carYes"), no=document.getElementById("carNo");
    if(yes) yes.style.display = formHasCar==="yes"?"block":"none";
    if(no)  no.style.display  = formHasCar==="yes"?"none":"block";
    return;
  }
  if(!t) return;
  var a=t.getAttribute("data-action"), id=t.getAttribute("data-id");
  var find=function(id){ for(var i=0;i<state.entries.length;i++) if(state.entries[i].id===id) return state.entries[i]; return null; };

  if(a==="tab"){ state.tab=t.getAttribute("data-tab"); if(state.tab==="board") markSeen(); render(); }
  else if(a==="dir"){ state.dir=t.getAttribute("data-dir"); render(); }
  else if(a==="board-scope"){ state.boardScope=t.getAttribute("data-scope"); render(); }
  else if(a==="post-msg"){
    var inp=document.getElementById("msgInput"); var me0=myEntries()[0];
    if(inp && me0 && inp.value.trim()){ postMessage(inp.value, state.boardScope, me0.name, me0.id); inp.value=""; }
  }
  else if(a==="del-msg"){
    var mid=id, msg=null; for(var j=0;j<state.messages.length;j++) if(state.messages[j].id===mid) msg=state.messages[j];
    if(msg && confirm("Delete this message?")) deleteMessage(msg);
  }
  else if(a==="copy"){ copyText(t.getAttribute("data-contact")); }
  else if(a==="howto-open"){ state.howto=true; render(); }
  else if(a==="howto-close"){ state.howto=false; render(); }
  else if(a==="howto-overlay"){ if(ev.target.closest("[data-stop]")) return; state.howto=false; render(); }
  else if(a==="modepick-continue"){
    state.modePick=false;
    state.form={mode:"add", prefill:{arrivalMode:pickArrival, departureMode:pickDeparture}};
    formWill=null; formHasCar=null; formAMode=null; formDMode=null; formShuttle=null; formBrunch=null; render();
  }
  else if(a==="modepick-overlay"){ if(ev.target.closest("[data-stop]")) return; state.modePick=false; render(); }
  else if(a==="add"){ openAddFlow(); }
  else if(a==="edit"){ state.form={mode:"edit", entry:find(id)}; formWill=null; formHasCar=null; formAMode=null; formDMode=null; formShuttle=null; formBrunch=null; render(); }
  else if(a==="delete"){ var e=find(id); if(e) deleteEntry(e); }
  else if(a==="claim-open"){ state.claimOpen=true; render(); }
  else if(a==="claim-submit"){ var c=document.getElementById("claimCode"); claimByCode(c?c.value:""); }
  else if(a==="form-cancel"){ state.form=null; render(); }
  else if(a==="overlay"){ if(ev.target.closest("[data-stop]")) return; state.form=null; render(); }
  else if(a==="form-save"){ submitForm(); }
  else if(a==="join"){ var me=activeMe(); if(me) joinGroup(me, t.getAttribute("data-gid"), state.dir); }
  else if(a==="leave"){ var me2=activeMe(); if(me2) leaveGroup(me2, state.dir); }
  else if(a==="start"){ var me3=activeMe(), other=find(id); if(me3&&other) startGroup(me3, other, state.dir); }
  else if(a==="kick"){ var e2=find(id); if(e2) adminKick(e2, t.getAttribute("data-dir")); }
  else if(a==="admin-unlock"){
    var pw=document.getElementById("adminPw");
    if(pw && pw.value===ADMIN_PASSWORD){ state.admin=true; render(); }
    else { var er=document.getElementById("adminErr"); if(er) er.style.display="block"; }
  }
});

function submitForm(){
  var f=state.form;
  var hasCar = (formHasCar!=null) ? (formHasCar==="yes") : !!(f.entry&&f.entry.hasCar);
  var aMode = formAMode || (f.prefill&&f.prefill.arrivalMode) || (f.entry&&f.entry.arrivalMode) || "carpool";
  var dMode = formDMode || (f.prefill&&f.prefill.departureMode) || (f.entry&&f.entry.departureMode) || "carpool";
  var needsShuttle = aMode==="train" ? (formShuttle!=null ? formShuttle==="yes" : (f.entry&&f.entry.needsShuttle!=null ? f.entry.needsShuttle : true)) : false;
  var brunch = formBrunch!=null ? formBrunch==="yes" : (f.entry&&f.entry.brunch!=null ? f.entry.brunch : true);
  var data={
    name:val("f_name").trim(),
    partySize:Math.max(1, parseInt(val("f_party")||"1",10)),
    arrivalMode:aMode, departureMode:dMode, needsShuttle:needsShuttle, brunch:brunch,
    arrivalAirport:val("f_aA"), arrivalAirportOther:val("f_aO").trim(), arrivalDate:val("f_aD"), arrivalTime:val("f_aT"),
    departureAirport:val("f_dA"), departureAirportOther:val("f_dO").trim(), departureDate:val("f_dD"),
    contact:val("f_contact").trim(),
    departureTime:val("f_dT"),
    hasCar:hasCar,
    openSeats: hasCar ? Math.max(0, parseInt(val("f_seats")||"0",10)) : 0,
    rentalWillingness: hasCar ? "yes" : (formWill || (f.entry&&f.entry.rentalWillingness) || "maybe")
  };
  if(!data.name){ toast("Please add your name(s)."); return; }
  if(data.arrivalMode!=="train" && data.arrivalAirport==="Other" && !data.arrivalAirportOther){ toast("Enter your arrival airport."); return; }
  if(data.departureMode!=="train" && data.departureAirport==="Other" && !data.departureAirportOther){ toast("Enter your departure airport."); return; }
  if(f.mode==="add") addEntry(data); else saveEdit(f.entry.id, data);
}

/* =================================================================
   Start
   ================================================================= */
if(!seenHowto()){ state.howto=true; markHowtoSeen(); }
render();
if(CONFIGURED){
  db.collection("entries").orderBy("createdAt","asc").onSnapshot(function(snap){
    var arr=[]; snap.forEach(function(d){ var o=d.data(); o.id=d.id; arr.push(o); });
    state.entries=arr; state.loaded=true; render();
  }, function(err){ console.error(err); state.loaded=true; render(); toast("Couldn't reach the database."); });

  db.collection("messages").orderBy("createdAt","asc").onSnapshot(function(snap){
    var arr=[]; snap.forEach(function(d){ var o=d.data(); o.id=d.id; arr.push(o); });
    state.messages=arr;
    if(state.tab==="board") markSeen();
    render();
  }, function(err){ console.error("messages:", err); });
}
</script>
</body>
</html>
